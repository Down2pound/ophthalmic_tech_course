name: Launch CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Check, test, build, and bundle
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.4.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm check

      - name: Run tests
        run: pnpm test

      - name: Build production app
        run: pnpm build

      - name: Print launch doctor report
        run: pnpm launch:doctor

      - name: Generate launch evidence bundle
        run: pnpm launch:bundle

      - name: Upload launch evidence bundle
        uses: actions/upload-artifact@v4
        with:
          name: launch-evidence
          path: launch-evidence
          retention-days: 14

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build production Docker image
        run: docker build --tag optitech-academy:${{ github.sha }} .
