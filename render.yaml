services:
  - type: web
    name: optitech-academy
    runtime: node
    plan: starter
    buildCommand: pnpm install --frozen-lockfile && pnpm run build
    startCommand: pnpm start
    healthCheckPath: /api/health
    disk:
      name: course-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_FILE
        value: /var/data/course-data.json
      - key: BUSINESS_NAME
        value: OptiTech Academy
      - key: SESSION_SECRET
        generateValue: true
      - key: PUBLIC_APP_URL
        fromService:
          type: web
          name: optitech-academy
          envVarKey: RENDER_EXTERNAL_URL
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_STANDARD_PRICE_ID
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_ALLOW_PROMOTION_CODES
        value: "true"
      - key: STRIPE_AUTOMATIC_TAX
        value: "false"
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: SUPPORT_EMAIL
        sync: false
      - key: SALES_NOTIFICATION_EMAIL
        sync: false
      - key: BUSINESS_LEGAL_NAME
        sync: false
      - key: BUSINESS_ADDRESS
        sync: false
      - key: SPINDEL_MANAGER_EMAIL
        sync: false
      - key: SPINDEL_MANAGER_PASSWORD
        sync: false
      - key: SPINDEL_MANAGER_FIRST_NAME
        value: Spindel
      - key: SPINDEL_MANAGER_LAST_NAME
        value: Administrator
      - key: SPINDEL_SEAT_LIMIT
        value: "100"
